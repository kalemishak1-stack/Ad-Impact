<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Ad Impact Pro - لوحة تحكم الفريق الكاملة</title>
    <style>
        /* تنسيقات CSS كاملة ومفصلة */
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f3; padding: 25px; }
        .header { background-color: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .controls-panel { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { background-color: #fff; padding: 20px; border-radius: 10px; border-right: 5px solid #3498db; text-align: center; }
        .data-table { width: 100%; border-collapse: collapse; background-color: white; border-radius: 10px; overflow: hidden; }
        .data-table th { background-color: #34495e; color: white; padding: 15px; }
        .data-table td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        .status-excellent { color: green; font-weight: bold; }
        .status-poor { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>نظام Ad Impact للإدارة والتحليل</h1>
</div>

<div class="controls-panel">
    <label>رابط Google Web App:</label><br>
    <input type="text" id="sheetUrl" style="width: 80%; padding: 10px; margin-top: 5px;" placeholder="ضع الرابط هنا...">
    <button id="fetchBtn" style="padding: 10px 20px; background-color: #27ae60; color: white; border: none; cursor: pointer;">جلب البيانات وتحديث اللوحة</button>
</div>

<div class="stats-grid">
    <div class="stat-card"><h3>عدد الحملات</h3><span id="countDisplay">0</span></div>
    <div class="stat-card"><h3>الأرباح المتوقعة</h3><span id="profitDisplay">$0</span></div>
    <div class="stat-card"><h3>إجمالي المصروف</h3><span id="spendDisplay">$0</span></div>
</div>

<table class="data-table">
    <thead>
        <tr>
            <th>اسم الحملة</th>
            <th>الزبون</th>
            <th>المنصة</th>
            <th>المصروف الفعلي</th>
            <th>عدد النتائج</th>
            <th>التكلفة للنتيجة (CPA)</th>
            <th>التقييم الذكي</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        <!-- سيتم ملء هذا الجزء برمجياً -->
    </tbody>
</table>

<script>
    /* القسم البرمجي (JavaScript) - منطق تشغيل النظام */
    
    document.getElementById('fetchBtn').addEventListener('click', function() {
        const url = document.getElementById('sheetUrl').value;
        if (!url) {
            alert("يرجى إدخال الرابط أولاً!");
            return;
        }

        // جلب البيانات من جوجل شيت
        fetch(url)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = ''; // تفريغ الجدول قبل التحديث
                
                let totalSpend = 0;
                let campaignCount = data.length;

                data.forEach(item => {
                    const name = item["اسم الحملة"] || "غير مسمى";
                    const client = item["الزبون"] || "غير معروف";
                    const platform = item["المنصة"] || "N/A";
                    const spend = parseFloat(item["المبلغ المصروف"] || 0);
                    const results = parseInt(item["النتائج"] || 0);
                    const cpa = parseFloat(item["تكلفة النتيجة"] || 0);

                    totalSpend += spend;

                    // منطق التقييم الذكي المفصل
                    let evaluation = "";
                    let evalClass = "";
                    
                    if (cpa <= 2.0) {
                        evaluation = "ممتاز";
                        evalClass = "status-excellent";
                    } else if (cpa > 2.0 && cpa <= 3.5) {
                        evaluation = "متوسط";
                        evalClass = "";
                    } else {
                        evaluation = "ضعيف";
                        evalClass = "status-poor";
                    }

                    // بناء صف الجدول
                    const row = `<tr>
                        <td>${name}</td>
                        <td>${client}</td>
                        <td>${platform}</td>
                        <td>$${spend.toFixed(2)}</td>
                        <td>${results}</td>
                        <td>$${cpa.toFixed(2)}</td>
                        <td class="${evalClass}">${evaluation}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });

                // تحديث ملخص الأرقام
                document.getElementById('countDisplay').innerText = campaignCount;
                document.getElementById('spendDisplay').innerText = "$" + totalSpend.toFixed(2);
                document.getElementById('profitDisplay').innerText = "$" + (totalSpend * 0.2).toFixed(2);
            })
            .catch(error => {
                console.error("خطأ:", error);
                alert("حدث خطأ أثناء جلب البيانات، تأكد من إعدادات النشر في Google Sheets");
            });
    });
</script>

</body>
</html>
